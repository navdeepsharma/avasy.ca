<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avasy Inc.</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; min-height: 100vh; background: #0a0a0a; color: #f0ede8; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 24px; text-align: center; }
.logo { width: 44px; height: 44px; border-radius: 10px; background: #fff; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 32px; }
.company { font-size: 13px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(240,237,232,0.4); margin-bottom: 20px; font-weight: 400; }
h1 { font-size: clamp(28px,5vw,48px); font-weight: 300; line-height: 1.2; max-width: 560px; margin: 0 auto 24px; letter-spacing: -0.02em; }
.sub { font-size: 16px; color: rgba(240,237,232,0.45); max-width: 380px; margin: 0 auto 48px; line-height: 1.7; font-weight: 300; }
.divider { width: 1px; height: 40px; background: rgba(240,237,232,0.15); margin: 0 auto 48px; }
.meta { font-size: 13px; color: rgba(240,237,232,0.3); letter-spacing: 0.06em; line-height: 2.4; }
.meta a { color: rgba(240,237,232,0.45); text-decoration: none; }
</style>
</head>
<body>
<div class="logo">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
    <rect x="3" y="3" width="8" height="8" rx="2" fill="#0a0a0a"/>
    <rect x="13" y="3" width="8" height="8" rx="2" fill="#0a0a0a"/>
    <rect x="3" y="13" width="8" height="8" rx="2" fill="#0a0a0a"/>
    <rect x="13" y="13" width="8" height="8" rx="2" fill="#0a0a0a"/>
  </svg>
</div>
<p class="company">Avasy Inc.</p>
<h1>Building thoughtful digital products.</h1>
<p class="sub">A technology company based in Ontario, Canada.</p>
<div class="divider"></div>
<div class="meta">
  Ontario, Canada &nbsp;·&nbsp; Incorporated 2025<br>
  <a href="mailto:nav@avasy.com">contact@avasy.ca</a>
</div>
</body>
</html>
